<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error | Artifauctor Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-main: #fcfbf9;      
            --border-dark: #111827;
            --accent-btn: #818cf8;   
            --shadow-lg: 8px 8px 0px var(--border-dark);
        }
        
        body { 
            background-color: var(--bg-main); 
            font-family: 'Space Grotesk', sans-serif; 
            color: var(--border-dark);
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .error-card {
            border: 4px solid var(--border-dark);
            background: #ffffff;
            box-shadow: var(--shadow-lg);
        }

        .brutalist-btn {
            border: 3px solid var(--border-dark);
            box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.15s ease;
            font-weight: 900;
            text-transform: uppercase;
        }
        .brutalist-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--border-dark); }
        .brutalist-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--border-dark); }

        /* Glitch effect for the error code */
        .glitch { position: relative; display: inline-block; }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="error-card max-w-2xl w-full p-10 md:p-16 text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-32 h-4 bg-yellow-400 border-b-4 border-r-4 border-gray-900 transform -rotate-45 -translate-x-10 -translate-y-4"></div>
        <div class="absolute bottom-0 right-0 w-32 h-4 bg-yellow-400 border-t-4 border-l-4 border-gray-900 transform -rotate-45 translate-x-10 translate-y-4"></div>

        <div class="mb-8">
            <h1 id="error-code" class="text-7xl md:text-9xl font-black mono tracking-tighter glitch" data-text="ERROR">ERROR</h1>
            <h2 id="error-title" class="text-2xl md:text-4xl font-bold uppercase mt-4 bg-gray-900 text-white inline-block px-4 py-2">SYSTEM FAULT</h2>
        </div>

        <p id="error-desc" class="text-lg md:text-xl font-medium text-gray-700 mb-10 max-w-lg mx-auto">
            A critical routing error has occurred. The requested artifact cannot be processed.
        </p>

        <button id="action-btn" class="brutalist-btn bg-indigo-300 px-8 py-4 text-lg w-full md:w-auto">
            REBOOT SEQUENCE
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Grab the URL parameter (e.g., ?code=401)
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code') || '404'; // Defaults to 404 if no code is provided

            const elCode = document.getElementById('error-code');
            const elTitle = document.getElementById('error-title');
            const elDesc = document.getElementById('error-desc');
            const btnAction = document.getElementById('action-btn');

            // 2. Morph the UI based on the code
            if (code === '401') {
                elCode.innerText = '401';
                elCode.setAttribute('data-text', '401');
                elTitle.innerText = 'UNAUTHORIZED ACCESS';
                elTitle.className = "text-2xl md:text-4xl font-bold uppercase mt-4 bg-red-500 text-white inline-block px-4 py-2 border-4 border-gray-900 shadow-[4px_4px_0px_#111827]";
                elDesc.innerHTML = "<strong>Hold up.</strong> You do not have the clearance to view this sector of the Engine. Please authenticate your session.";
                
                btnAction.innerText = 'Authenticate Now →';
                btnAction.classList.replace('bg-indigo-300', 'bg-yellow-300');
                btnAction.onclick = () => window.location.href = 'auth.html';
            
            } else {
                // Default 404 Not Found
                elCode.innerText = '404';
                elCode.setAttribute('data-text', '404');
                elTitle.innerText = 'ARTIFACT NOT FOUND';
                elTitle.className = "text-2xl md:text-4xl font-bold uppercase mt-4 bg-gray-900 text-white inline-block px-4 py-2 border-4 border-gray-900 shadow-[4px_4px_0px_#111827]";
                elDesc.innerHTML = "You have wandered off the map. This pipeline or artifact does not exist in the current directory.";
                
                btnAction.innerText = '← Return to Safety';
                btnAction.onclick = () => {
                    // Send them back where they came from, or to dashboard if direct link
                    if (document.referrer && !document.referrer.includes('error.html')) {
                        history.back();
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                };
            }
        });
    </script>
</body>
</html>
